name: Build and deploy blueprint

on:
  push:
    branches:
      - main # Trigger on pushes to the default branch
  workflow_dispatch: # Allow manual triggering from the Actions tab

# Cancel previous runs on the same ref
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

# Permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build project and blueprint
    steps:
      - name: Cleanup to free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.0
        with:
          tool-cache: false
          android: true
          dotnet: false
          haskell: false
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Checkout project
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0 # full history (lean-action / blueprint need tags)

      # Fetches the pinned Mathlib cache (`lake exe cache get`) and runs `lake build`.
      - name: Build Lean project
        uses: leanprover/lean-action@434f25c2f80ded67bba02502ad3a86f25db50709 # 2025-07-02
        with:
          build: true
          lint: false # scaffold uses `sorry`; enable once proofs land
          test: false

      # Builds the blueprint (PDF via xelatex + web via plasTeX, incl. checkdecls
      # and the dependency graph) and deploys it to GitHub Pages.
      # `api-docs: false` avoids requiring a doc-gen4 dependency for now.
      - name: Build blueprint and deploy to Pages
        uses: leanprover-community/docgen-action@deed0cdc44dd8e5de07a300773eb751d33e32fc8 # 2025-10-26
        with:
          blueprint: true
          api-docs: false
          build-page: false
          deploy: true
